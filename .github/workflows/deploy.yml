name: Deploy

# Build the static frontend and publish it to GitHub Pages.
#
# Triggers:
#   - push to main          → normal code/data pushes by humans
#   - workflow_run          → after the data workflows commit fresh data.
#                             (A push made by the default GITHUB_TOKEN does NOT
#                             trigger another workflow, so we chain explicitly.)
#   - workflow_dispatch     → manual redeploy
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Historical Backfill", "Daily Refresh"]
    types: [completed]
  workflow_dispatch:

# peaceiris/actions-gh-pages pushes to the gh-pages branch.
permissions:
  contents: write

# Never run two deploys at once; let the latest finish.
concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # For the workflow_run trigger, only deploy when the upstream run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # The frontend serves data from <base>/data/*. In dev that's a symlink;
      # in the production build the committed data/ directory is copied in.
      - name: Copy data into the build's public dir
        run: |
          rm -rf frontend/public/data
          cp -R data frontend/public/data

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
